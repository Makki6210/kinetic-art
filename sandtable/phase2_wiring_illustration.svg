  <rect x="70" y="90" width="220" height="120" rx="10" fill="#fff" stroke="#ea580c"/>
  <text x="110" y="160" font-size="22" font-family="Arial" fill="#9a3412">Arduino</text>

  <rect x="360" y="90" width="240" height="120" rx="10" fill="#fff" stroke="#ea580c"/>
  <text x="405" y="160" font-size="22" font-family="Arial" fill="#9a3412">CNC Shield</text>

  <rect x="680" y="70" width="210" height="70" rx="10" fill="#fff" stroke="#ea580c"/>
  <text x="730" y="113" font-size="18" font-family="Arial" fill="#9a3412">Motor X</text>
  <rect x="680" y="150" width="210" height="70" rx="10" fill="#fff" stroke="#ea580c"/>
  <text x="730" y="193" font-size="18" font-family="Arial" fill="#9a3412">Motor Y</text>

  <line x1="290" y1="150" x2="360" y2="150" stroke="#f97316" stroke-width="4"/>
  <line x1="600" y1="105" x2="680" y2="105" stroke="#f97316" stroke-width="4"/>
  <line x1="600" y1="185" x2="680" y2="185" stroke="#f97316" stroke-width="4"/>

  <rect x="70" y="260" width="820" height="110" rx="12" fill="#ffedd5" stroke="#fb923c"/>
  <text x="95" y="295" font-size="20" font-family="Arial" fill="#9a3412">通電順序（固定）</text>
  <text x="95" y="325" font-size="18" font-family="Arial" fill="#9a3412">1) 電源OFFで配線確認 → 2) 通電 → 3) GコードでX/Y単体テスト</text>
  <text x="95" y="350" font-size="18" font-family="Arial" fill="#9a3412">※ ケーブルラベル: X motor / Y motor / 24V / GND</text>
