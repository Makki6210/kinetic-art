  <!-- P1-6 segments -->
  <rect x="50" y="548" width="170" height="12" rx="6" fill="#3b82f6"/>
  <rect x="220" y="548" width="100" height="12" rx="6" fill="#16a34a"/>
  <rect x="320" y="548" width="130" height="12" rx="6" fill="#059669"/>
  <rect x="450" y="548" width="120" height="12" rx="6" fill="#ca8a04"/>
  <rect x="570" y="548" width="195" height="12" rx="6" fill="#7c3aed"/>
  <rect x="765" y="548" width="135" height="12" rx="6" fill="#dc2626"/>

  <!-- Phase labels below -->
  <text x="135" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#2563eb">P1: 2〜3週</text>
  <text x="270" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#15803d">P2: 1〜2週</text>
  <text x="385" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#065f46">P3: 1〜2週</text>
  <text x="510" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#92400e">P4: 1〜2週</text>
  <text x="667" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#5b21b6">P5: 2〜3週</text>
  <text x="832" y="578" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#b91c1c">P6: 1〜2週</text>

  <text x="480" y="612" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#64748b">合計: 約8〜14週間（実作業日 約20〜30日）  ※P1部品待ち中にP5ソフト開発を並行可能</text>

  <!-- Arrow defs -->
  <defs>
