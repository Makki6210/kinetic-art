  <text x="110" y="126" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#3b82f6">2〜3週間</text>

  <!-- Arrow P1 → Gate1 -->
  <line x1="190" y1="95" x2="238" y2="95" stroke="#374151" stroke-width="2" marker-end="url(#garr)"/>

