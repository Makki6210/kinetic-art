  <text x="281" y="166" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#78350f">3Dプリント発注済み</text>
  <text x="281" y="182" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#78350f">図面（寸法）確定済み</text>

  <!-- Arrow Gate1 → P2 -->
  <line x1="330" y1="95" x2="378" y2="95" stroke="#374151" stroke-width="2" marker-end="url(#garr)"/>

