<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">
  <rect width="960" height="640" fill="#f9fafb"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial,sans-serif" fill="#111827">フェーズ進行ゲート：次のフェーズへ進む判断基準</text>

  <!-- ===== PHASE BOXES and GATES ===== -->

