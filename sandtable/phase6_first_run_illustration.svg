<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#eef2ff"/>
  <text x="40" y="45" font-size="28" font-family="Arial" fill="#312e81">フェーズ6: 初回描画・調整イメージ</text>

  <rect x="70" y="85" width="360" height="280" rx="12" fill="#fff" stroke="#6366f1"/>
  <text x="95" y="120" font-size="20" font-family="Arial" fill="#312e81">最初の1本目</text>
  <circle cx="250" cy="230" r="95" fill="none" stroke="#818cf8" stroke-width="3"/>
  <circle cx="250" cy="230" r="55" fill="none" stroke="#a5b4fc" stroke-width="3"/>
  <circle cx="250" cy="230" r="8" fill="#1d4ed8"/>
  <text x="95" y="340" font-size="16" font-family="Arial" fill="#4338ca">複雑模様より「大きな円」から開始</text>

  <rect x="470" y="85" width="420" height="280" rx="12" fill="#fff" stroke="#6366f1"/>
  <text x="495" y="120" font-size="20" font-family="Arial" fill="#312e81">症状→調整</text>
  <text x="495" y="165" font-size="16" font-family="Arial" fill="#1e1b4b">線が途切れる → 磁石高さを近づける</text>
  <text x="495" y="200" font-size="16" font-family="Arial" fill="#1e1b4b">ボールが跳ねる → 速度を下げる</text>
  <text x="495" y="235" font-size="16" font-family="Arial" fill="#1e1b4b">掘れすぎる → 砂厚を増やす</text>
  <text x="495" y="270" font-size="16" font-family="Arial" fill="#1e1b4b">角でズレる → ベルト張力再調整</text>
  <text x="495" y="320" font-size="16" font-family="Arial" fill="#4338ca">順番: 磁石高さ → 速度 → 砂厚</text>
</svg>
