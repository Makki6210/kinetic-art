<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <rect width="960" height="560" fill="#eef2ff"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial,sans-serif" fill="#312e81">フェーズ6：初回描画と調整ガイド</text>

  <!-- ===== LEFT: First test pattern ===== -->
  <rect x="15" y="55" width="320" height="490" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="175" y="78" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial,sans-serif" fill="#312e81">① 最初に描くべきパターン</text>

  <!-- Sand surface (top-down view) -->
  <rect x="35" y="90" width="280" height="280" rx="4" fill="#e8dcc8"/>
  <!-- Sand pattern - simple expanding circle (easiest to verify) -->
  <circle cx="175" cy="230" r="20" fill="none" stroke="#c4ad8a" stroke-width="3" opacity="0.6"/>
  <circle cx="175" cy="230" r="55" fill="none" stroke="#c4ad8a" stroke-width="3" opacity="0.7"/>
  <circle cx="175" cy="230" r="90" fill="none" stroke="#c4ad8a" stroke-width="3" opacity="0.8"/>
  <circle cx="175" cy="230" r="125" fill="none" stroke="#c4ad8a" stroke-width="2.5" opacity="0.9"/>
  <!-- Ball current position -->
  <circle cx="175" cy="105" r="10" fill="#c0c0c0" stroke="#888" stroke-width="1.5"/>
  <circle cx="173" cy="103" r="3" fill="#eee" opacity="0.7"/>
  <!-- Trail arrow showing direction -->
  <path d="M175,115 Q130,160 130,230" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="3 2" opacity="0.5" marker-end="url(#arr2)"/>

  <!-- Label -->
  <text x="175" y="232" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#92400e">同心円（スパイラル）</text>

  <!-- LED glow at borders -->
  <rect x="35" y="90" width="280" height="280" rx="4" fill="none" stroke="#0066FF" stroke-width="4" opacity="0.25"/>

  <text x="175" y="400" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#4338ca">推奨最初のGコード</text>
  <rect x="40" y="410" width="270" height="55" rx="5" fill="#1e1b4b"/>
  <text x="175" y="430" text-anchor="middle" font-size="10" font-family="monospace" fill="#a5b4fc">G21; G90; G28  ; ホーミング</text>
  <text x="175" y="448" text-anchor="middle" font-size="10" font-family="monospace" fill="#a5b4fc">G2 X0 Y0 I50 J0 F800</text>
  <text x="175" y="466" text-anchor="middle" font-size="10" font-family="monospace" fill="#a5b4fc">; ←円を描く（半径50mm）</text>

  <text x="175" y="498" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#6b7280">複雑パターンより「大きな円」から開始</text>
  <text x="175" y="516" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#6b7280">問題の発見が最も容易</text>

  <!-- ===== RIGHT: Troubleshooting table ===== -->
  <rect x="348" y="55" width="600" height="490" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="648" y="78" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial,sans-serif" fill="#312e81">② 症状 → 原因 → 対処（調整順序）</text>

  <!-- Header row -->
  <rect x="358" y="88" width="580" height="30" rx="3" fill="#312e81"/>
  <text x="480" y="108" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">症状（見た目）</text>
  <text x="660" y="108" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">原因</text>
  <text x="840" y="108" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">対処</text>
  <line x1="590" y1="88" x2="590" y2="530" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="750" y1="88" x2="750" y2="530" stroke="#c7d2fe" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="358" y="118" width="580" height="66" rx="2" fill="#fef2f2"/>
  <text x="363" y="138" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#b91c1c">線が途切れる・消える</text>
  <!-- Mini schematic: broken line -->
  <line x1="363" y1="158" x2="380" y2="152" stroke="#c4ad8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="395" y1="165" x2="418" y2="155" stroke="#c4ad8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="430" y1="175" x2="450" y2="160" stroke="#c4ad8a" stroke-width="3" stroke-linecap="round"/>
  <text x="595" y="143" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">磁石とアクリル板の</text>
  <text x="595" y="160" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">距離が遠すぎる</text>
  <text x="595" y="177" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#6b7280">（磁力が砂ボールに届かない）</text>
  <text x="845" y="143" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">磁石ホルダーを</text>
  <text x="845" y="160" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">上方向（アクリル側）</text>
  <text x="845" y="177" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">に調整</text>

  <!-- Row 2 -->
  <rect x="358" y="184" width="580" height="66" rx="2" fill="#fff7ed"/>
  <text x="363" y="204" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#c2410c">ボールが跳ねる・飛ぶ</text>
  <!-- Mini schematic: jumpy ball path -->
  <path d="M363,228 Q380,208 400,228 Q420,208 440,228 Q460,208 480,228" stroke="#c4ad8a" stroke-width="2.5" fill="none"/>
  <text x="595" y="204" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">送り速度（F値）が</text>
  <text x="595" y="221" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">速すぎる</text>
  <text x="595" y="238" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#6b7280">慣性でボールが先行してしまう</text>
  <text x="845" y="204" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">F800→F500 に下げる</text>
  <text x="845" y="221" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">加速度 $120/$121 も</text>
  <text x="845" y="238" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">150 に下げる</text>

  <!-- Row 3 -->
  <rect x="358" y="250" width="580" height="66" rx="2" fill="#fefce8"/>
  <text x="363" y="270" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#a16207">砂を深く掘りすぎる</text>
  <!-- Mini schematic: deep groove -->
  <path d="M363,300 Q380,295 395,286 Q410,277 425,274 Q440,277 455,284 Q470,291 485,293" stroke="#c4ad8a" stroke-width="4" fill="none"/>
  <text x="595" y="270" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">砂が薄すぎる or</text>
  <text x="595" y="287" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">磁石が近づきすぎ</text>
  <text x="845" y="270" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">砂厚を 12mm に増やす</text>
  <text x="845" y="287" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">or 磁石ホルダーを</text>
  <text x="845" y="304" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">わずかに下げる</text>

  <!-- Row 4 -->
  <rect x="358" y="316" width="580" height="66" rx="2" fill="#eff6ff"/>
  <text x="363" y="336" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#1d4ed8">コーナーで位置がずれる</text>
  <!-- Mini schematic: shifted at corner -->
  <path d="M363,360 L400,360 L400,380" stroke="#c4ad8a" stroke-width="3" fill="none"/>
  <path d="M415,356 L452,360 L448,385" stroke="#c4ad8a" stroke-width="3" fill="none" opacity="0.5"/>
  <text x="595" y="336" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">GT2ベルトの張力が</text>
  <text x="595" y="353" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">不均等 or ゆるい</text>
  <text x="845" y="336" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">ベルトを指で弾いて</text>
  <text x="845" y="353" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">低い音がするまで張る</text>
  <text x="845" y="370" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">（A=B の張力で）</text>

  <!-- Row 5 -->
  <rect x="358" y="382" width="580" height="66" rx="2" fill="#f5f3ff"/>
  <text x="363" y="402" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#5b21b6">線幅が一定しない</text>
  <text x="595" y="402" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">テーブルが水平でない</text>
  <text x="595" y="419" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#374151">→ 砂が偏る</text>
  <text x="845" y="402" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">脚のアジャスターで</text>
  <text x="845" y="419" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">4隅の水平を調整</text>
  <text x="845" y="436" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#15803d">（水準器を使う）</text>

  <!-- Tuning sequence (bottom) -->
  <rect x="358" y="460" width="580" height="75" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="648" y="480" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#14532d">③ 調整優先順位（この順番で行う）</text>
  <!-- Sequence boxes -->
  <rect x="370" y="490" width="90" height="35" rx="4" fill="#16a34a"/>
  <text x="415" y="507" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#fff">① 磁石高さ</text>
  <text x="415" y="520" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#bbf7d0">3〜5mm 隙間</text>
  <text x="473" y="512" text-anchor="middle" font-size="20" font-family="Arial,sans-serif" fill="#94a3b8">→</text>
  <rect x="490" y="490" width="90" height="35" rx="4" fill="#2563eb"/>
  <text x="535" y="507" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#fff">② 速度調整</text>
  <text x="535" y="520" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#bfdbfe">F800〜1500</text>
  <text x="593" y="512" text-anchor="middle" font-size="20" font-family="Arial,sans-serif" fill="#94a3b8">→</text>
  <rect x="610" y="490" width="90" height="35" rx="4" fill="#ca8a04"/>
  <text x="655" y="507" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#fff">③ 砂厚調整</text>
  <text x="655" y="520" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fef9c3">8〜12mm</text>
  <text x="713" y="512" text-anchor="middle" font-size="20" font-family="Arial,sans-serif" fill="#94a3b8">→</text>
  <rect x="730" y="490" width="95" height="35" rx="4" fill="#7c3aed"/>
  <text x="777" y="507" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#fff">④ ベルト張力</text>
  <text x="777" y="520" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#e9d5ff">均等・適正張力</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="2"/>
    </marker>
  </defs>
</svg>
