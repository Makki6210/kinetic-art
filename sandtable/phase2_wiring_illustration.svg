<svg xmlns="http://www.w3.org/2000/svg" width="960" height="570" viewBox="0 0 960 570">
  <rect width="960" height="570" fill="#fff7ed"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial,sans-serif" fill="#7c2d12">フェーズ2：電装配線図（接続の全体像）</text>

  <!-- ===== WARNING BOX: TMC2209 orientation ===== -->
  <rect x="580" y="50" width="360" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <polygon points="596,62 612,62 604,50" fill="#dc2626"/>
  <text x="604" y="61" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">!</text>
  <text x="622" y="70" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#b91c1c">⚠ TMC2209 の向き注意</text>
  <text x="596" y="90" font-size="11" font-family="Arial,sans-serif" fill="#7f1d1d">GNDピンをシールドの GND シルク側に合わせる。</text>
  <text x="596" y="108" font-size="11" font-family="Arial,sans-serif" fill="#7f1d1d">逆挿しすると即破損。挿入前に写真で向きを確認。</text>

  <!-- ===== COMPONENT: Raspberry Pi (top-left) ===== -->
  <rect x="30" y="70" width="120" height="80" rx="5" fill="#2d8b3e" stroke="#1a5c26" stroke-width="2"/>
  <!-- GPIO header -->
  <rect x="36" y="66" width="108" height="6" rx="1" fill="#ffd700"/>
  <text x="90" y="108" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">Raspberry Pi 4</text>
  <text x="90" y="128" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#a7f3d0">（制御コンピュータ）</text>
  <!-- USB port indicator -->
  <rect x="140" y="95" width="12" height="18" rx="2" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  <text x="146" y="106" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#fff">USB</text>
  <!-- GPIO indicator -->
  <rect x="30" y="140" width="120" height="8" rx="2" fill="#15803d" stroke="#14532d" stroke-width="0.5"/>
  <text x="90" y="165" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#166534">GPIO26 → NeoPixel</text>

  <!-- USB cable: RPi → Arduino -->
  <path d="M152,104 L190,104" stroke="#888" stroke-width="3" stroke-dasharray="5 3" fill="none"/>
  <text x="170" y="97" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#666">USB</text>

  <!-- ===== COMPONENT: Arduino Uno ===== -->
  <rect x="192" y="62" width="135" height="95" rx="5" fill="#0066aa" stroke="#004477" stroke-width="2"/>
  <text x="260" y="95" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">Arduino Uno</text>
  <!-- Pin rows -->
  <g fill="#ffd700">
    <rect x="198" y="64" width="122" height="5" rx="1"/>
    <rect x="198" y="152" width="122" height="5" rx="1"/>
  </g>
  <text x="260" y="118" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#93c5fd">ATmega328P</text>
  <text x="260" y="138" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#93c5fd">GRBLファームウェア</text>

  <!-- CNC Shield stacked on Arduino -->
  <rect x="192" y="162" width="135" height="75" rx="4" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="260" y="190" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">CNC Shield v3</text>
  <text x="260" y="208" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#bfdbfe">（Arduinoに直接刺す）</text>
  <!-- TMC2209 slots labeled on CNC Shield -->
  <rect x="200" y="218" width="45" height="16" rx="2" fill="#b91c1c" stroke="#7f1d1d"/>
  <text x="222" y="230" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">X軸スロット</text>
  <rect x="272" y="218" width="45" height="16" rx="2" fill="#b91c1c" stroke="#7f1d1d"/>
  <text x="294" y="230" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">Y軸スロット</text>

  <!-- ===== COMPONENT: TMC2209 Drivers ===== -->
  <!-- TMC2209-X -->
  <rect x="185" y="250" width="58" height="80" rx="4" fill="#991b1b" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="214" y="272" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">TMC2209</text>
  <text x="214" y="288" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#fca5a5">X軸</text>
  <text x="214" y="304" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fca5a5">GND→下</text>
  <!-- Pin indicator (GND marker) -->
  <rect x="189" y="324" width="50" height="5" rx="1" fill="#fbbf24"/>
  <text x="214" y="336" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#fbbf24">GNDピン</text>

  <!-- TMC2209-Y -->
  <rect x="258" y="250" width="58" height="80" rx="4" fill="#991b1b" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="287" y="272" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">TMC2209</text>
  <text x="287" y="288" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#fca5a5">Y軸</text>
  <text x="287" y="304" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fca5a5">GND→下</text>
  <rect x="262" y="324" width="50" height="5" rx="1" fill="#fbbf24"/>
  <text x="287" y="336" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="#fbbf24">GNDピン</text>

  <!-- ===== COMPONENT: Motor A (top) ===== -->
  <rect x="100" y="370" width="120" height="65" rx="5" fill="#374151" stroke="#111827" stroke-width="2"/>
  <circle cx="160" cy="402" r="15" fill="#555" stroke="#333"/>
  <circle cx="160" cy="402" r="6" fill="#777"/>
  <text x="160" y="424" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">Motor A</text>
  <text x="160" y="440" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#9ca3af">NEMA17（左モーター）</text>
  <!-- 4-wire connector -->
  <rect x="102" y="372" width="28" height="40" rx="2" fill="#222" stroke="#555"/>
  <rect x="105" y="376" width="5" height="5" rx="1" fill="#f97316"/>
  <rect x="105" y="385" width="5" height="5" rx="1" fill="#111"/>
  <rect x="105" y="394" width="5" height="5" rx="1" fill="#16a34a"/>
  <rect x="105" y="403" width="5" height="5" rx="1" fill="#2563eb"/>

  <!-- ===== COMPONENT: Motor B (top-right) ===== -->
  <rect x="370" y="370" width="120" height="65" rx="5" fill="#374151" stroke="#111827" stroke-width="2"/>
  <circle cx="430" cy="402" r="15" fill="#555" stroke="#333"/>
  <circle cx="430" cy="402" r="6" fill="#777"/>
  <text x="430" y="424" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">Motor B</text>
  <text x="430" y="440" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#9ca3af">NEMA17（右モーター）</text>
  <!-- 4-wire connector -->
  <rect x="460" y="372" width="28" height="40" rx="2" fill="#222" stroke="#555"/>
  <rect x="463" y="376" width="5" height="5" rx="1" fill="#f97316"/>
  <rect x="463" y="385" width="5" height="5" rx="1" fill="#111"/>
  <rect x="463" y="394" width="5" height="5" rx="1" fill="#16a34a"/>
  <rect x="463" y="403" width="5" height="5" rx="1" fill="#2563eb"/>

  <!-- Motor wires: A to TMC2209-X -->
  <path d="M130,370 L130,348 L214,348 L214,330" stroke="#f97316" stroke-width="2" fill="none"/>
  <path d="M133,370 L133,345 L217,345 L217,330" stroke="#111" stroke-width="2" fill="none"/>
  <path d="M136,370 L136,342 L220,342 L220,330" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M139,370 L139,339 L223,339 L223,330" stroke="#2563eb" stroke-width="2" fill="none"/>

  <!-- Motor wires: B to TMC2209-Y -->
  <path d="M462,372 L462,348 L287,348 L287,330" stroke="#f97316" stroke-width="2" fill="none"/>
  <path d="M465,372 L465,345 L290,345 L290,330" stroke="#111" stroke-width="2" fill="none"/>
  <path d="M468,372 L468,342 L293,342 L293,330" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M471,372 L471,339 L296,339 L296,330" stroke="#2563eb" stroke-width="2" fill="none"/>

  <!-- ===== COMPONENT: 24V PSU ===== -->
  <rect x="540" y="170" width="130" height="90" rx="5" fill="#374151" stroke="#111827" stroke-width="2"/>
  <rect x="548" y="178" width="114" height="74" rx="3" fill="#4b5563"/>
  <text x="605" y="210" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#e5e7eb">24V 5A</text>
  <text x="605" y="228" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#9ca3af">電源アダプター</text>
  <!-- Power output terminals -->
  <rect x="548" y="248" width="25" height="14" rx="2" fill="#dc2626"/>
  <text x="560" y="258" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">+24V</text>
  <rect x="578" y="248" width="25" height="14" rx="2" fill="#1f2937"/>
  <text x="590" y="258" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">GND</text>
  <!-- AC input -->
  <rect x="615" y="248" width="40" height="14" rx="2" fill="#6b7280"/>
  <text x="635" y="258" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#fff">AC100V</text>

  <!-- Power wires: PSU → CNC Shield -->
  <path d="M548,252 L460,252 L460,200 L327,200" stroke="#dc2626" stroke-width="2.5" fill="none"/>
  <path d="M578,252 L455,252 L455,205 L327,205" stroke="#222" stroke-width="2.5" fill="none"/>
  <text x="430" y="245" font-size="10" font-family="Arial,sans-serif" fill="#dc2626">24V→</text>

  <!-- ===== COMPONENT: NeoPixel strip ===== -->
  <rect x="540" y="370" width="170" height="65" rx="5" fill="#312e81" stroke="#1e1b4b" stroke-width="1.5"/>
  <text x="625" y="398" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">WS2812B NeoPixel</text>
  <text x="625" y="416" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#a5b4fc">（テーブル内周 1m）</text>
  <!-- LED dots -->
  <circle cx="550" cy="428" r="4" fill="#3b82f6"/>
  <circle cx="562" cy="428" r="4" fill="#06b6d4"/>
  <circle cx="574" cy="428" r="4" fill="#0066FF"/>
  <circle cx="586" cy="428" r="4" fill="#c2b280"/>

  <!-- NeoPixel wires from RPi GPIO26 -->
  <path d="M90,160 L90,450 L540,450" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <text x="300" y="465" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#a855f7">GPIO26 → DATA IN</text>

  <!-- ===== BOTTOM: Step-by-step procedure ===== -->
  <rect x="30" y="490" width="910" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="513" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="#1e293b">作業の順番（必ず守る）</text>
  <!-- Steps -->
  <circle cx="65" cy="540" r="12" fill="#dc2626"/>
  <text x="65" y="544" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">①</text>
  <text x="82" y="538" font-size="11" font-family="Arial,sans-serif" fill="#374151">電源OFF で全配線完了</text>
  <text x="82" y="552" font-size="10" font-family="Arial,sans-serif" fill="#64748b">テスターで短絡チェック</text>

  <text x="240" y="544" text-anchor="middle" font-size="18" font-family="Arial,sans-serif" fill="#94a3b8">→</text>

  <circle cx="270" cy="540" r="12" fill="#ca8a04"/>
  <text x="270" y="544" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">②</text>
  <text x="287" y="538" font-size="11" font-family="Arial,sans-serif" fill="#374151">24V 電源 ON</text>
  <text x="287" y="552" font-size="10" font-family="Arial,sans-serif" fill="#64748b">煙・異臭がないか確認</text>

  <text x="440" y="544" text-anchor="middle" font-size="18" font-family="Arial,sans-serif" fill="#94a3b8">→</text>

  <circle cx="470" cy="540" r="12" fill="#2563eb"/>
  <text x="470" y="544" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">③</text>
  <text x="487" y="538" font-size="11" font-family="Arial,sans-serif" fill="#374151">GRBL書き込み（Arduino IDE）</text>
  <text x="487" y="552" font-size="10" font-family="Arial,sans-serif" fill="#64748b">UGSでコンソール接続確認</text>

  <text x="660" y="544" text-anchor="middle" font-size="18" font-family="Arial,sans-serif" fill="#94a3b8">→</text>

  <circle cx="690" cy="540" r="12" fill="#16a34a"/>
  <text x="690" y="544" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">④</text>
  <text x="707" y="538" font-size="11" font-family="Arial,sans-serif" fill="#374151">G91; G1 X10 F500 でモーター動作</text>
  <text x="707" y="552" font-size="10" font-family="Arial,sans-serif" fill="#64748b">X/Y それぞれ単体テスト</text>
</svg>
